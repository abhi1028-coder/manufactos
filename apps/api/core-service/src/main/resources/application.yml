server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: core-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:manufactos}
    username: ${DB_USER:manufactos}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# JWT configuration — override via env vars in production
app:
  jwt:
    secret: ${JWT_SECRET:your-secret-here-must-be-at-least-32-chars-long}
    expiration-ms: ${JWT_EXPIRY_MS:3600000}       # 1 hour
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}  # 7 days

# Eureka service discovery
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.manufactos: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
