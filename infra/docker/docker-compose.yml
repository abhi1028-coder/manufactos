version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  manufactos-net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  kafka-data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: manufactos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-manufactos}
      POSTGRES_USER:     ${DB_USER:-manufactos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-manufactos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manufactos-net

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: manufactos-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manufactos-net

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: manufactos-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - manufactos-net

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: manufactos-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - manufactos-net

  # ── Core Service (Java 21 / Spring Boot) ─────────────────────────────────────
  core-service:
    build:
      context: ../../apps/api/core-service
      dockerfile: Dockerfile
    container_name: manufactos-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME:-manufactos}
      DB_USER:       ${DB_USER:-manufactos}
      DB_PASSWORD:   ${DB_PASSWORD:-change-me}
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      JWT_SECRET:    ${JWT_SECRET:-your-secret-here-must-be-at-least-32-chars-long}
      EUREKA_URL:    http://localhost:8761/eureka/
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - manufactos-net

  # ── AI Worker (Python / FastAPI) ─────────────────────────────────────────────
  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    container_name: manufactos-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL:          redis://redis:6379/0
      CORE_SERVICE_URL:   http://core-service:8081
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-your-openai-api-key-here}
      JWT_SECRET:         ${JWT_SECRET:-your-secret-here-must-be-at-least-32-chars-long}
      CELERY_BROKER_URL:  redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - manufactos-net

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: manufactos-nginx
    restart: unless-stopped
    depends_on:
      - core-service
      - worker
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - manufactos-net
