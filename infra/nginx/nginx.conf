worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ─── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ─── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── Upstreams ─────────────────────────────────────────────────────────────
    upstream core_service {
        server core-service:8081;
        keepalive 16;
    }

    upstream order_service {
        server order-service:8082;
        keepalive 8;
    }

    upstream finance_service {
        server finance-service:8083;
        keepalive 8;
    }

    upstream workforce_service {
        server workforce-service:8084;
        keepalive 8;
    }

    upstream fleet_service {
        server fleet-service:8085;
        keepalive 8;
    }

    upstream portal_service {
        server portal-service:8086;
        keepalive 8;
    }

    upstream ai_worker {
        server worker:8087;
        keepalive 8;
    }

    upstream notification_service {
        server notification-service:8088;
        keepalive 8;
    }

    # ─── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        client_max_body_size 20M;

        # ── Auth endpoints (stricter rate limit) ────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://core_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Core service (users, customers, plants) ─────────────────────────
        location /api/users/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://core_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/customers/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://core_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Order service ────────────────────────────────────────────────────
        location /api/orders/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://order_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Finance service ──────────────────────────────────────────────────
        location /api/invoices/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://finance_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/expenses/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://finance_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Workforce service ────────────────────────────────────────────────
        location /api/workers/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://workforce_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/attendance/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://workforce_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Fleet service ────────────────────────────────────────────────────
        location /api/fleet/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://fleet_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/trips/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://fleet_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Portal service ───────────────────────────────────────────────────
        location /api/portal/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://portal_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── AI worker ────────────────────────────────────────────────────────
        location /api/nlq {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://ai_worker/nlq;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;  # NLQ may take longer
        }

        location /api/briefing/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass         http://ai_worker;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Notification service ─────────────────────────────────────────────
        location /api/notifications/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://notification_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ── Health aggregator ────────────────────────────────────────────────
        location /health {
            proxy_pass         http://core_service/actuator/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ── 404 fallback ─────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
