name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all | core-service | worker | web)"
        required: false
        default: all

env:
  AWS_REGION:       ap-south-1
  ECR_REGISTRY:     ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER:      manufactos-staging
  ECS_SERVICE_CORE: manufactos-core-service
  ECS_SERVICE_WRK:  manufactos-worker

jobs:
  # ─── Run CI first ──────────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ─── Build and push Docker images to ECR ──────────────────────────────────
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      core-image: ${{ steps.meta-core.outputs.tags }}
      worker-image: ${{ steps.meta-worker.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Core Service ──────────────────────────────────────────────────────
      - name: Docker metadata — core-service
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/manufactos/core-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging-latest

      - name: Build & push core-service
        uses: docker/build-push-action@v5
        with:
          context: apps/api/core-service
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI Worker ─────────────────────────────────────────────────────────
      - name: Docker metadata — worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/manufactos/worker
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging-latest

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: apps/worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy core-service to ECS ───────────────────────────────────────────
  deploy-core:
    name: Deploy core-service to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force ECS service update — core-service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_CORE }} \
            --force-new-deployment \
            --query "service.serviceArn" \
            --output text

      - name: Wait for ECS service stability — core-service
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_CORE }}

  # ─── Deploy worker to ECS ─────────────────────────────────────────────────
  deploy-worker:
    name: Deploy worker to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force ECS service update — worker
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_WRK }} \
            --force-new-deployment \
            --query "service.serviceArn" \
            --output text

      - name: Wait for ECS service stability — worker
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_WRK }}

  # ─── Post-deploy notification ─────────────────────────────────────────────
  notify:
    name: Notify Staging Deployment
    runs-on: ubuntu-latest
    needs: [deploy-core, deploy-worker]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service      | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| core-service | ${{ needs.deploy-core.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| worker       | ${{ needs.deploy-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Region: **${{ env.AWS_REGION }}** · Cluster: **${{ env.ECS_CLUSTER }}**" >> $GITHUB_STEP_SUMMARY
