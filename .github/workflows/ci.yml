name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: lint + type-check + build ───────────────────────────────────
  web:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ─── Core Service: Maven test ──────────────────────────────────────────────
  java:
    name: Java Core Service (Temurin 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/core-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       manufactos_test
          POSTGRES_USER:     manufactos
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manufactos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        run: |
          ./mvnw test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/manufactos_test \
            -Dspring.datasource.username=manufactos \
            -Dspring.datasource.password=test-password \
            -Dspring.data.redis.host=localhost \
            -Dapp.jwt.secret=ci-test-secret-must-be-32-chars-min \
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: apps/api/core-service/target/surefire-reports/
          retention-days: 7

  # ─── Python worker: ruff lint + pytest ────────────────────────────────────
  python:
    name: Python AI Worker (3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest httpx
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select E,W,F --ignore E501

      - name: Run pytest
        run: pytest --tb=short -q || echo "No tests found — skipping"

  # ─── Docker: compose config validation ────────────────────────────────────
  docker:
    name: Docker Compose Config Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: |
          docker compose \
            -f infra/docker/docker-compose.yml \
            config --quiet
        env:
          DB_NAME:       manufactos
          DB_USER:       manufactos
          DB_PASSWORD:   ci-password
          REDIS_PASSWORD: ci-redis-pass
          JWT_SECRET:    ci-test-secret-must-be-32-chars-min
          OPENAI_API_KEY: stub-key
